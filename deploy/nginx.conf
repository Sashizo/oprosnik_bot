# Nginx site config для Interview Bot — web-admin reverse proxy.
#
# Скопировать в /etc/nginx/sites-available/interview
# Создать symlink: sudo ln -s /etc/nginx/sites-available/interview /etc/nginx/sites-enabled/
# Проверить: sudo nginx -t
# Перезагрузить: sudo systemctl reload nginx
#
# HTTPS (M17): после регистрации Duck DNS поддомена запустить:
#   sudo certbot --nginx -d <subdomain>.duckdns.org
# Certbot автоматически добавит SSL-блок и редирект 80→443 в этот файл.

# HTTP → HTTPS редирект (добавляется certbot автоматически)
server {
    listen 80;
    server_name <subdomain>.duckdns.org;

    # До HTTPS: пропускать трафик напрямую (убрать после certbot)
    # После certbot этот блок заменяется редиректом 301 → https

    client_max_body_size 5M;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
}

