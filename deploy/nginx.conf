# Nginx site config для Interview Bot — web-admin reverse proxy.
# Скопировать в /etc/nginx/sites-available/interview
# Создать symlink: sudo ln -s /etc/nginx/sites-available/interview /etc/nginx/sites-enabled/
# Проверить: sudo nginx -t
# Перезагрузить: sudo systemctl reload nginx

server {
    listen 80;
    # Замените на ваш домен или публичный IP:
    server_name example.com;

    # Максимальный размер тела запроса (для загрузки YAML/форм в admin).
    client_max_body_size 5M;

    # Таймауты: 120 с — запас для LLM-preview и экспорта.
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;

    location / {
        proxy_pass http://127.0.0.1:8000;

        # Передаём реальный IP клиента в приложение.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Отключаем буферизацию ответов — для корректного streaming (если появится).
        proxy_buffering off;
    }
}

# После получения домена и установки certbot HTTPS-блок добавится автоматически:
#   sudo certbot --nginx -d example.com
# certbot добавит listen 443 ssl, перенаправление 80→443 и настроит автообновление.
