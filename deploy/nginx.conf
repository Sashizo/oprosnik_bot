# Nginx site config для Interview Bot — web-admin reverse proxy.
# Актуальная конфигурация после M17 (HTTPS через Let's Encrypt / Duck DNS).
#
# На сервере: /etc/nginx/sites-available/interview
# Symlink:    /etc/nginx/sites-enabled/interview
#
# Для обновления сертификата: sudo certbot renew
# Автообновление: certbot.timer (systemd) — дважды в день.

server {
    server_name soc-oprosnik.duckdns.org;

    client_max_body_size 5M;

    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/soc-oprosnik.duckdns.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/soc-oprosnik.duckdns.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# HTTP → HTTPS redirect (managed by Certbot)
server {
    if ($host = soc-oprosnik.duckdns.org) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name soc-oprosnik.duckdns.org;
    return 404;
}
